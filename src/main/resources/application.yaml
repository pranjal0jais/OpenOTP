spring:
  application:
    name: otp-service

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

otp:
  expiry-minutes: ${OTP_EXPIRY_MINUTES:5}
  resend-cooldown-seconds: ${OTP_RESEND_COOLDOWN_SECONDS:50}
  max-attempts: ${OTP_MAX_ATTEMPTS:3}
  queue:
    name: otp.email.queue
    exchange: otp.exchange
    routing-key: otp.send
    dlq: otp.email.queue.dlq
    dlx: otp.exchange.dlx

hmac:
  secret-key: ${HMAC_SECRET_KEY}

security:
  api-key: ${API_KEY}