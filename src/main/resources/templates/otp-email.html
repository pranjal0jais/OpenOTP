<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div style="font-family: Arial, sans-serif; max-width: 480px; margin: auto; padding: 24px;">

    <h2 style="color: #1F3864;">Your One-Time Password</h2>

    <p style="color: #333;">Use the code below to complete your verification.</p>

    <div style="font-size: 36px; font-weight: bold; letter-spacing: 8px;
                color: #2E5597; padding: 16px 0;">
        <span th:text="${otpCode}">000000</span>
    </div>

    <p style="color: #888;">This code expires in <strong>5 minutes</strong>.</p>
    <p style="color: #888;">If you did not request this, ignore this email.</p>

</div>
</body>
</html>
