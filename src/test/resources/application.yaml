spring:
  application:
    name: otp-service-test

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

otp:
  expiry-minutes: 5
  resend-cooldown-seconds: 50
  max-attempts: 3

  queue:
    name: otp.email.queue
    exchange: otp.exchange
    routing-key: otp.send
    dlq: otp.email.queue.dlq
    dlx: otp.exchange.dlx

hmac:
  secret-key: test-secret

security:
  api-key: test-key